# Produces native installers you can download from the Actions run summary:
# .dmg (macOS universal), .exe/.msi (Windows), .deb/.AppImage (Linux).
# Trigger: Actions → "Desktop (Tauri) build" → Run workflow, or push a git tag v*.*.*
name: Desktop (Tauri) build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: desktop-build-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  bundle:
    env:
      # Quieter on runners moving default to Node 24 (see GitHub Actions changelog).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: universal-apple-darwin
            artifact: kern-macos
            bundle_path: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle
          - os: windows-latest
            target: ''
            artifact: kern-windows
            bundle_path: apps/desktop/src-tauri/target/release/bundle
          - os: ubuntu-22.04
            target: ''
            artifact: kern-linux
            bundle_path: apps/desktop/src-tauri/target/release/bundle

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Linux dependencies (Tauri / WebKit)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      # Omit `version` — action reads pnpm from root package.json `packageManager` (pnpm@…).
      # Do not set `version: from-package`; it conflicts with `packageManager` in this action.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Rust stable (macOS universal targets)
        if: matrix.target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust stable
        if: matrix.target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        run: pnpm install

      - name: Build Tauri bundles
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.target }}" ]]; then
            pnpm --filter desktop run build -- --target "${{ matrix.target }}"
          else
            pnpm --filter desktop run build
          fi

      - name: List bundle output
        shell: bash
        run: ls -laR "${{ matrix.bundle_path }}" || true

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle_path }}/
          if-no-files-found: error
