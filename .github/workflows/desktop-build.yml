# Produces native installers you can download from the Actions run summary:
# - macOS: .dmg for Apple Silicon (GitHub macos-latest); Intel Macs need a separate x86_64 build if you still support them.
# - Windows: .exe / .msi
# - Linux: .deb
# Trigger: Actions → "Desktop (Tauri) build" → Run workflow, or push a git tag v*.*.*
name: Desktop (Tauri) build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: desktop-build-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  bundle:
    env:
      # Quieter on runners moving default to Node 24 (see GitHub Actions changelog).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      # Embedded web build reads these at compile time (no .env.local on runners). If unset,
      # @supabase/supabase-js throws at import → blank window in the packaged app.
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: kern-macos
            bundle_path: apps/desktop/src-tauri/target/release/bundle
          - os: windows-latest
            artifact: kern-windows
            bundle_path: apps/desktop/src-tauri/target/release/bundle
          - os: ubuntu-22.04
            artifact: kern-linux
            bundle_path: apps/desktop/src-tauri/target/release/bundle

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Linux dependencies (Tauri / WebKit)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      # Omit `version` — action reads pnpm from root package.json `packageManager` (pnpm@…).
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        run: pnpm install

      - name: Require Supabase Vite env for bundle
        shell: bash
        run: |
          if [[ -z "${VITE_SUPABASE_URL:-}" || -z "${VITE_SUPABASE_ANON_KEY:-}" ]]; then
            echo "::error::Add repository secrets VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY (same as apps/web/.env.local). Without them the web bundle crashes at startup and the desktop app shows a blank window."
            exit 1
          fi

      - name: Build Tauri bundles
        run: pnpm --filter desktop run build

      - name: List bundle output
        shell: bash
        run: ls -laR "${{ matrix.bundle_path }}" || true

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.bundle_path }}/
          if-no-files-found: error
